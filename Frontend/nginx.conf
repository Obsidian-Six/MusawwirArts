server {
    listen 80;
    server_name musawwirart.com;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Main Frontend Routing
    location / {
        # Standard SPA routing
        try_files $uri $uri/ /index.html;

        # Production Security: Only allow your own domain to access the frontend
        add_header 'Access-Control-Allow-Origin' 'https://musawwirart.com' always;
        
        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # 2. Serve ALL Uploads (Paintings & Blogs)
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        
        # Performance for Prod
        expires 30d; # Paintings don't change often, cache longer
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 3. API Proxy
    location /api/ {
        proxy_pass http://backend:3000; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}